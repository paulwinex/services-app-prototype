name: "$APP_NAME"

services:
  app:
    image: ${APP_NAME}-app:${TAG:-dev}
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: production-image
    container_name: "${APP_NAME}-app"
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - ../.env
    environment:
      APP_DB_HOST: "${APP_NAME}-db"
    depends_on:
      db:
        condition: service_healthy
    restart: always
    networks:
      - default

  db:
    image: postgres:17
    container_name: "${APP_NAME}-db"
    env_file:
      - ../.env
    environment:
      POSTGRES_USER: ${APP_DB_USER}
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD}
      POSTGRES_DB: ${APP_DB_NAME}
    expose:
      - 5432
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: always
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APP_DB_USER} -d ${APP_DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 3s

  nats:
    image: nats:alpine
    container_name: "${APP_NAME}-nats"
    command: ["nats-server", "--cluster", "nats://0.0.0.0:6222", "--http_port", "8222"]
    expose:
      - 4222
      - 6222
      - 8222
    ports:
      - "${APP_NATS_PORT:-4222}:4222"
      - "${APP_NATS_MONITORING_PORT:-8222}:8222"
    restart: always
    networks:
      - default

networks:
  default: